services:
  alloy:
    build:
      context: .
      dockerfile: alloy/Dockerfile
    ports:
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ./alloy/config.alloy:/etc/alloy/config.alloy
    environment:
      - GCLOUD_OTLP_ENDPOINT=${GCLOUD_OTLP_ENDPOINT}
      - GCLOUD_INSTANCE_ID=${GCLOUD_INSTANCE_ID}
      - GCLOUD_RW_API_KEY=${GCLOUD_RW_API_KEY}
    command:
      - run
      - /etc/alloy/config.alloy
    depends_on:
      flagd:
        condition: service_started

  flagd:
    image: ghcr.io/open-feature/flagd:v0.11.3
    ports:
      - "8013:8013"
    volumes:
      - ./flagd:/flagd
    command:
      - start
      - --uri
      - file:/flagd/flags.json

  inventory-service:
    build:
      context: .
      dockerfile: services/inventory-service/Dockerfile
    ports:
      - "8002:8002"
    environment:
      - FLAGD_HOST=flagd
      - FLAGD_PORT=8015
      - OTEL_SERVICE_NAME=inventory-service
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://alloy:4317
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
      - OTEL_RESOURCE_ATTRIBUTES=service.namespace=grafana-ai-demo,service.version=0.1.0,deployment.environment=dev,service.instance.id=inventory-service-1,sdworx.tribe=products,sdworx.squad=sre
      - PYROSCOPE_ENDPOINT=${GCLOUD_HOSTED_PYROSCOPE_URL}
      - PYROSCOPE_USER=${GCLOUD_HOSTED_PYROSCOPE_ID}
      - PYROSCOPE_PASSWORD=${GCLOUD_RW_API_KEY}
      - PYROSCOPE_TENANT_ID=dev
    depends_on:
      flagd:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')"]
      interval: 5s
      timeout: 3s
      retries: 5

  order-service:
    build:
      context: .
      dockerfile: services/order-service/Dockerfile
    ports:
      - "8001:8001"
    environment:
      - INVENTORY_SERVICE_URL=http://inventory-service:8002
      - FLAGD_HOST=flagd
      - FLAGD_PORT=8015
      - OTEL_SERVICE_NAME=order-service
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://alloy:4317
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
      - OTEL_RESOURCE_ATTRIBUTES=service.namespace=grafana-ai-demo,service.version=0.1.0,deployment.environment=dev,service.instance.id=order-service-1,sdworx.tribe=products,sdworx.squad=sre
      - PYROSCOPE_ENDPOINT=${GCLOUD_HOSTED_PYROSCOPE_URL}
      - PYROSCOPE_USER=${GCLOUD_HOSTED_PYROSCOPE_ID}
      - PYROSCOPE_PASSWORD=${GCLOUD_RW_API_KEY}
      - PYROSCOPE_TENANT_ID=dev
    depends_on:
      inventory-service:
        condition: service_healthy
      flagd:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 5s
      timeout: 3s
      retries: 5

  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - ORDER_SERVICE_URL=http://order-service:8001
      - OTEL_SERVICE_NAME=api-gateway
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://alloy:4317
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
      - OTEL_RESOURCE_ATTRIBUTES=service.namespace=grafana-ai-demo,service.version=0.1.0,deployment.environment=dev,service.instance.id=api-gateway-1,sdworx.tribe=products,sdworx.squad=sre
      - PYROSCOPE_ENDPOINT=${GCLOUD_HOSTED_PYROSCOPE_URL}
      - PYROSCOPE_USER=${GCLOUD_HOSTED_PYROSCOPE_ID}
      - PYROSCOPE_PASSWORD=${GCLOUD_RW_API_KEY}
      - PYROSCOPE_TENANT_ID=dev
    depends_on:
      order-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 5s
      timeout: 3s
      retries: 5

  load-generator:
    build: ./load-generator
    environment:
      - GATEWAY_URL=http://api-gateway:8000
      - REQUESTS_PER_SECOND=5
    depends_on:
      api-gateway:
        condition: service_healthy
    restart: unless-stopped
